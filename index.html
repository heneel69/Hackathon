<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="IMS - Inventory Management System. Manage products, categories, warehouses and stock levels." />
  <title>IMS — Inventory Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="material-icons-outlined brand-icon">warehouse</span>
        <div>
          <h1 class="brand-title">IMS</h1>
          <p class="brand-subtitle">Inventory System</p>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <a href="#products" class="nav-link active" data-page="products">
          <span class="material-icons-outlined">inventory_2</span>
          <span>Products</span>
        </a>
        <a href="#categories" class="nav-link" data-page="categories">
          <span class="material-icons-outlined">category</span>
          <span>Categories</span>
        </a>
        <a href="#alerts" class="nav-link" data-page="alerts">
          <span class="material-icons-outlined">notifications</span>
          <span>Alerts</span>
          <span class="alert-badge" id="alert-badge" style="display:none;">0</span>
        </a>
        <a href="#settings" class="nav-link" data-page="settings">
          <span class="material-icons-outlined">settings</span>
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-user">
        <div class="user-avatar">AR</div>
        <div>
          <p class="user-name">Alex Rivera</p>
          <p class="user-role">Admin</p>
        </div>
      </div>
    </aside>
    <main class="main-content" id="main-content">
      <!-- Pages rendered here by router -->
    </main>
  </div>

  <!-- Toast notification -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal backdrop -->
  <div class="modal-backdrop" id="modal-backdrop" style="display:none;">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
