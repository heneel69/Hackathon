<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMS — Verify OTP</title>
    <meta name="description" content="Inventory Management System — Enter your OTP to verify" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">🔐</div>
                <div class="logo-text">Inv<span>MS</span></div>
            </div>
            <h1 class="auth-title">Verify OTP</h1>
            <p class="auth-subtitle">Enter the 6-digit code sent to your email</p>

            <div id="alert" class="alert"></div>

            <div class="otp-hint">
                ℹ️ For local testing, check the <strong>server console</strong> for your OTP code.
            </div>

            <form id="otpForm" novalidate>
                <div class="form-group">
                    <label for="otp">One-Time Password</label>
                    <input type="text" id="otp" name="otp" placeholder="123456" maxlength="6" inputmode="numeric"
                        pattern="[0-9]*" required autocomplete="one-time-code" />
                </div>
                <button type="submit" class="btn" id="verifyBtn">Verify OTP</button>
            </form>

            <p class="auth-link" style="margin-top:16px"><a href="/forgot">← Resend OTP</a></p>
        </div>
    </div>
    <script src="/js/otp.js"></script>
</body>

</html>
