<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMS — Create Account</title>
    <meta name="description" content="Inventory Management System — Create a new account" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">📦</div>
                <div class="logo-text">Inv<span>MS</span></div>
            </div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join the Inventory Management System</p>

            <div id="alert" class="alert"></div>

            <form id="signupForm" novalidate>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Smith" autocomplete="name" required />
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email"
                        required />
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" name="role">
                        <option value="Warehouse Staff">Warehouse Staff</option>
                        <option value="Inventory Manager">Inventory Manager</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min. 8 characters"
                        autocomplete="new-password" required />
                </div>
                <button type="submit" class="btn" id="signupBtn">Create Account</button>
            </form>

            <p class="auth-link" style="margin-top:16px">Already have an account? <a href="/" id="loginLink">Sign in</a>
            </p>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>

</html>
